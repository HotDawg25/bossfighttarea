<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Monstruo de la Tarea: FASE 2</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #fff;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            transition: filter 0.1s ease;
            user-select: none;
            -webkit-user-select: none;
        }

        #game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 800px;
            transition: width 0.5s ease;
            position: relative;
        }

        #ui-container {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 1.2rem;
            visibility: hidden;
        }

        .bar-container {
            width: 250px;
            height: 22px;
            background-color: #111;
            border: 2px solid #444;
            border-radius: 4px;
            overflow: hidden;
        }

        #boss-health-bar {
            width: 100%;
            height: 100%;
            background-color: #e74c3c;
            transition: width 0.1s ease, background-color 0.5s;
        }

        #player-health-bar {
            width: 100%;
            height: 100%;
            background-color: #2ecc71;
            transition: width 0.1s ease;
        }

        #pause-btn {
            background: #222;
            color: #fff;
            border: 2px solid #fff;
            padding: 5px 15px;
            cursor: pointer;
            font-family: monospace;
            font-size: 1rem;
            border-radius: 4px;
        }
        #pause-btn:hover { background: #fff; color: #000; }

        canvas {
            background-color: #111;
            border: 4px solid #ff4444;
            box-shadow: 0 0 30px rgba(255, 68, 68, 0.2);
            width: 100%;
            transition: border-color 0.5s, box-shadow 0.5s;
        }

        .overlay-screen {
            position: absolute;
            font-size: 1.5rem;
            background: rgba(5,5,5,0.95);
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            border: 3px solid #333;
            z-index: 100;
            max-width: 85%;
            max-height: 85%;
            overflow-y: auto;
        }

        #main-menu-screen { display: block; border-color: #f1c40f; width: 550px; }
        #game-over-screen { display: none; border-color: #2ecc71; }
        
        #pause-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 90;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .start-options {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 15px;
        }

        button {
            font-size: 1.1rem; margin-top: 15px; padding: 10px 20px; cursor: pointer; 
            font-family: monospace; background: #222; color: #fff; border: 2px solid #fff;
            border-radius: 4px;
        }
        button:hover { background: #fff; color: #000; }

        /* Achievements Layout Panel */
        #achievements-panel {
            margin-top: 25px;
            border-top: 2px dashed #444;
            padding-top: 15px;
            text-align: left;
        }
        .achievement-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
            background: #111;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #222;
        }
        .achievement-row.locked { opacity: 0.35; filter: grayscale(1); }
        .ach-icon-preview {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid #444;
        }
        .achievement-row.unlocked .ach-icon-preview {
            border-color: #f1c40f;
        }
        .ach-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
        .ach-dot.unlocked { background: #f1c40f; box-shadow: 0 0 8px #f1c40f; }
        .ach-dot.locked { background: #555; }

        /* Mobile Layout Controls */
        #mobile-controls {
            display: none;
            position: absolute;
            bottom: 10px;
            width: 100%;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 50;
            pointer-events: none;
        }

        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 50px);
            grid-template-rows: repeat(3, 50px);
            gap: 5px;
            pointer-events: auto;
        }

        .mobile-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            color: white;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
        }
        .mobile-btn:active { background: rgba(255, 255, 255, 0.4); }

        #btn-up { grid-column: 2; grid-row: 1; border-radius: 8px; }
        #btn-left { grid-column: 1; grid-row: 2; border-radius: 8px; }
        #btn-right { grid-column: 3; grid-row: 2; border-radius: 8px; }
        #btn-down { grid-column: 2; grid-row: 3; border-radius: 8px; }

        #action-pad {
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
        }

        #btn-shoot {
            width: 80px;
            height: 80px;
            background: rgba(255, 68, 68, 0.3);
            border: 3px solid rgba(255, 68, 68, 0.6);
            font-size: 1.1rem;
            font-weight: bold;
        }

        /* Achievement Alert Popups */
        #achievement-toast {
            position: fixed;
            top: -100px;
            right: 20px;
            background: #111;
            border: 3px solid #f1c40f;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 200;
            transition: top 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        #achievement-toast.show { top: 20px; }
        #achievement-img { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; border: 1px solid #fff; }
        #achievement-text { font-family: monospace; }
        #achievement-title { color: #f1c40f; font-weight: bold; font-size: 1rem; margin: 0; }
        #achievement-desc { color: #fff; font-size: 0.85rem; margin: 3px 0 0 0; }
    </style>
</head>

    <div id="game-wrapper">

    <div id="main-menu-screen" class="overlay-screen">

            <div id="achievements-list"></div>
        </div>
    </div>

    <div id="game-over-screen" class="overlay-screen">
        <h2 id="game-msg" style="margin: 0 0 15px 0;">FIN DEL JUEGO</h2>
        <div style="display: flex; flex-direction: column; gap: 10px; align-items: center;">
            <button onclick="resetGame()" style="width: 220px;">Volver a intentar</button>
            <button onclick="returnToMenuDirectly()" style="border-color: #f1c40f; color: #f1c40f; width: 220px;">Menú Principal</button>
        </div>
    </div>

            <p id="achievement-title">¡LOGRO DESBLOQUEADO!</p>

        </div>
    </div>
